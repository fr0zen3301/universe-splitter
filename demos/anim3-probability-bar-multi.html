<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Design 3b — Probability Bar with many universes</title>
<style>
  @font-face { font-family:'Frozen'; src:url("../src/assets/fonts/font.otf") format('opentype'); }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;}
  body{
    font-family:'Frozen',sans-serif;color:#fff;
    background:radial-gradient(circle at 50% 50%,#0A0F1F 0%,#02030A 70%,#000 100%);
    display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;
  }
  body::before{
    content:"";position:absolute;inset:-10%;pointer-events:none;
    background:
      repeating-linear-gradient(90deg,rgba(150,190,255,0.05) 0 1px,transparent 1px 10px),
      repeating-linear-gradient(90deg,rgba(150,190,255,0.03) 0 1px,transparent 1px 23px);
    animation:q-interfere 18s linear infinite;
  }
  @keyframes q-interfere{to{transform:translateX(10px);}}
  .label{position:absolute;top:24px;left:0;right:0;text-align:center;font-size:13px;letter-spacing:3px;color:rgba(255,255,255,0.4);}
  .stage{position:relative;z-index:1;width:660px;max-width:92vw;height:340px;border:2px solid rgba(255,255,255,0.25);display:flex;align-items:center;justify-content:center;text-align:center;}
  .bar{position:relative;display:flex;height:84px;border:2px solid rgba(255,255,255,0.4);overflow:hidden;}
  .seg{display:flex;align-items:center;justify-content:center;font-size:13px;color:rgba(255,255,255,0.7);
       padding:0 4px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;
       border-right:1px solid rgba(255,255,255,0.3);transition:background .25s,color .25s;}
  .seg:last-child{border-right:none;}
  .seg.win{background:rgba(150,190,255,0.30);color:#fff;font-size:14px;}
  .needle{position:absolute;top:-6px;bottom:-6px;width:3px;background:#fff;left:0;box-shadow:0 0 10px #fff;}
  .status{margin-top:26px;font-size:22px;letter-spacing:2px;color:rgba(255,255,255,0.85);min-height:28px;}
  .hint{margin-top:10px;font-size:12px;letter-spacing:2px;color:rgba(255,255,255,0.35);}
</style>
</head>
<body>
<div class="label">DESIGN 3b — PROBABILITY BAR · 5 WEIGHTED UNIVERSES</div>
<div class="stage">
  <div style="width:90%;">
    <div class="bar" id="bar"></div>
    <div class="status" id="status">measuring</div>
    <div class="hint" id="hint"></div>
  </div>
</div>
<script>
  // name + weight. wider segment = higher weight = more likely.
  const OPTIONS=[
    {name:"Pizza", w:3},
    {name:"Sushi", w:2},
    {name:"Burger",w:2},
    {name:"Tacos", w:1},
    {name:"Salad", w:1},
  ];
  const total=OPTIONS.reduce((s,o)=>s+o.w,0);
  const bar=document.getElementById('bar');
  const status=document.getElementById('status');
  const hint=document.getElementById('hint');
  const segs=OPTIONS.map(o=>{
    const d=document.createElement('div');
    d.className='seg';
    d.style.flex=o.w;
    d.textContent=o.name;
    bar.appendChild(d);
    return d;
  });
  const needle=document.createElement('div');
  needle.className='needle';
  bar.appendChild(needle);
  hint.textContent="weights  "+OPTIONS.map(o=>o.name+":"+o.w).join("   ");

  function winnerIndex(pos){
    let acc=0;
    for(let i=0;i<OPTIONS.length;i++){acc+=OPTIONS[i].w/total;if(pos<=acc)return i;}
    return OPTIONS.length-1;
  }
  function run(){
    segs.forEach(s=>s.classList.remove('win'));
    status.textContent="measuring";
    const finalPos=Math.random();
    const start=performance.now();const dur=2000;
    function tick(now){
      const t=(now-start)/dur;
      if(t<1){
        const wobble=Math.sin(t*44)*(1-t)*0.5;
        let p=Math.max(0,Math.min(1,finalPos+wobble));
        needle.style.left=(p*100)+"%";
        requestAnimationFrame(tick);
      }else{
        needle.style.left=(finalPos*100)+"%";
        const idx=winnerIndex(finalPos);
        segs[idx].classList.add('win');
        status.textContent="\u2192 "+OPTIONS[idx].name;
        setTimeout(run,2000);
      }
    }
    requestAnimationFrame(tick);
  }
  run();
</script>
</body>
</html>
