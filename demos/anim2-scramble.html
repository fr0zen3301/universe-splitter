<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Design 2 — Quantum Scramble / Collapse</title>
<style>
  @font-face { font-family:'Frozen'; src:url("../src/assets/fonts/font.otf") format('opentype'); }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;}
  body{
    font-family:'Frozen',sans-serif;color:#fff;
    background:radial-gradient(circle at 50% 50%,#0A0F1F 0%,#02030A 70%,#000 100%);
    display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;
  }
  body::before{
    content:"";position:absolute;inset:-10%;pointer-events:none;
    background:
      repeating-linear-gradient(90deg,rgba(150,190,255,0.05) 0 1px,transparent 1px 10px),
      repeating-linear-gradient(90deg,rgba(150,190,255,0.03) 0 1px,transparent 1px 23px);
    animation:q-interfere 18s linear infinite;
  }
  @keyframes q-interfere{to{transform:translateX(10px);}}
  .label{position:absolute;top:24px;left:0;right:0;text-align:center;font-size:13px;letter-spacing:3px;color:rgba(255,255,255,0.4);}
  .stage{position:relative;z-index:1;width:620px;max-width:90vw;height:320px;border:2px solid rgba(255,255,255,0.25);display:flex;align-items:center;justify-content:center;text-align:center;}
  .small{font-size:20px;color:rgba(255,255,255,0.6);margin-bottom:14px;letter-spacing:2px;}
  .big{font-size:40px;min-height:48px;}
  .glitch{color:#9cc4ff;text-shadow:2px 0 #ff3b6b,-2px 0 #3bd1ff;}
  .locked{animation:pop .4s ease-out;}
  @keyframes pop{from{opacity:0;transform:scale(1.15)}to{opacity:1;transform:scale(1)}}
</style>
</head>
<body>
<div class="label">DESIGN 2 — QUANTUM SCRAMBLE / COLLAPSE</div>
<div class="stage">
  <div>
    <div class="small" id="cap">collapsing the wavefunction</div>
    <div class="big" id="scramble">??????</div>
  </div>
</div>
<script>
  const OPTIONS=["Take a chance","Do not take a chance"];
  const GLYPHS="01\u03c8\u0394\u03a3|/\\<>=+*x\u03bb\u03c6";
  const scr=document.getElementById('scramble');
  const cap=document.getElementById('cap');
  function randGlyphs(len){let s="";for(let i=0;i<len;i++)s+=GLYPHS[Math.floor(Math.random()*GLYPHS.length)];return s;}
  function run(){
    cap.textContent="collapsing the wavefunction";
    const winner=OPTIONS[Math.floor(Math.random()*2)];
    const total=2000;const start=performance.now();
    function tick(now){
      const elapsed=now-start;
      if(elapsed<total){
        if(Math.random()<0.55){scr.textContent=OPTIONS[Math.floor(Math.random()*2)];scr.className="big";}
        else{scr.textContent=randGlyphs(8+Math.floor(Math.random()*8));scr.className="big glitch";}
        const delay=40+(elapsed/total)*170;
        setTimeout(()=>requestAnimationFrame(tick),delay);
      }else{
        scr.textContent=winner;scr.className="big locked";
        cap.textContent="the universe chose";
        setTimeout(run,1900);
      }
    }
    requestAnimationFrame(tick);
  }
  run();
</script>
</body>
</html>
